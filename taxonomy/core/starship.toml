[directory]
home_symbol = "🏠 ~"
style = "blue bold"
truncation_length = 5
truncate_to_repo = true

[python]
format = "via [ $version]($style) "
python_binary = "python3"
detect_extensions = []
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", "setup.py", ".python-version", "poetry.lock", "pdm.lock"]
detect_folders = [".venv", "venv", ".env"]
style = "yellow bold"

[nodejs]
format = "via [⬢ $version](bold green) "
detect_extensions = []
detect_files = ["package.json", "tsconfig.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[golang]
format = "via [ $version](bold cyan) "
detect_extensions = []
detect_files = ["go.mod", "go.work", "go.sum"]
detect_folders = ["Godeps"]
style = "cyan bold"

[package]
format = "⬡ $version "
display_private = false

[php]
format = "via [ $version](bold magenta) "
detect_extensions = ["php"]
detect_files = ["composer.json", "composer.lock"]
disabled = false

[aws]
disabled = true          

[git_branch]
symbol = "  "
style = "bold green"
truncation_length = 16
truncation_symbol = "…"
only_attached = false

[git_status]
format = '[\($all\)]($style) '
style = "bold yellow"
ahead = '⇡ $count '
behind = '⇣ $count '
diverged = '⇕ ⇡$ahead_count ⇣$behind_count '
stashed = '📦 $count '
untracked = ' $count '
modified = '✚ $count '
staged = ' $count '
renamed = ' $count '
deleted = ' $count '

[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "
vicmd_symbol = "[❮](bold green) "

[time]
format = "[$time]($style) "
time_format = "%H:%M:%S"
style = "dim white"
disabled = false

[battery]
full_symbol = "🔋 "
charging_symbol = "⚡ "
discharging_symbol = " "
format = "[$symbol$percentage]($style) "
disabled = false

[[battery.display]]
threshold = 10
style = "red bold"

[[battery.display]]
threshold = 30
style = "yellow bold"

[[battery.display]]
threshold = 100
style = "green bold"

[line_break]
disabled = false

[bun]
# Removed unsupported command_timeout configuration